<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | Asharib Tech</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; }
        h2 { color: #00ff88; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: white; outline: none; }
        input:focus { border-color: #00ff88; }
        .save-btn { background: #00ff88; color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Edit: {{ p.name }}</h2>
        <form method="POST">
            <div class="form-group"><label>Product Name</label><input type="text" name="name" value="{{ p.name }}" required></div>
            <div class="form-group"><label>Current Price (Rs)</label><input type="text" name="price" value="{{ p.price }}" required></div>
            <div class="form-group"><label>Old Price (Rs)</label><input type="text" name="old_price" value="{{ p.old_price }}"></div>
            <div class="form-group"><label>Stock Status</label><input type="text" name="stock" value="{{ p.stock }}" required></div>
            <div class="form-group"><label>Image URL</label><input type="text" name="pic" value="{{ p.pic }}" required></div>
            <div class="form-group"><label>Description</label><textarea name="desc" rows="4">{{ p.desc }}</textarea></div>
            <button type="submit" class="save-btn">UPDATE PRODUCT</button>
            <a href="/admin" style="display:block; text-align:center; color:#666; margin-top:15px; text-decoration:none;">Cancel & Go Back</a>
        </form>
    </div>
</body>
</html>
