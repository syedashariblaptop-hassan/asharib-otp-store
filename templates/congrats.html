<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { text-align: center; background: #111; padding: 50px; border-radius: 20px; border: 1px solid #00ff88; box-shadow: 0 0 30px #00ff8844; }
        h1 { color: #00ff88; font-size: 40px; }
        .btn { background: #00ff88; color: black; padding: 15px 30px; text-decoration: none; border-radius: 50px; font-weight: bold; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: white; transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size: 60px;">🎉</div>
        <h1>Congratulations!</h1>
        <p>Your professional account has been created successfully.</p>
        <p style="color: #888;">Welcome to the most advanced OTP Store community.</p>
        <a href="/auth" class="btn">Click This and Login Professional</a>
    </div>
</body>
</html>
