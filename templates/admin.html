<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel | Asharib Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; overflow-x: hidden; }
        .admin-container { max-width: 1000px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; margin-top: 10px; }
        .header h1 { font-size: 22px; color: #00ff88; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; position: relative; overflow: hidden; }
        .stat-card i { color: #00ff88; font-size: 24px; margin-bottom: 10px; }
        .stat-card h3 { margin: 5px 0; font-size: 24px; font-weight: 800; }
        .stat-card p { margin: 0; font-size: 12px; color: #888; text-transform: uppercase; }

        /* Deposit Management Card */
        .deposit-management-box {
            background: linear-gradient(145deg, #1a1a1a, #111);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #00ff8833;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,255,136,0.05);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        .deposit-btn {
            background: #00ff88;
            color: black;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            position: relative;
        }
        
        .btn-glow {
            border: 2px solid #ff4444 !important;
            animation: pulse-red 2s infinite;
        }

        .deposit-btn:hover { background: white; transform: scale(1.05); }

        .pending-badge {
            background: #ff4444;
            color: white;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            margin-left: 5px;
            border: 2px solid #111;
        }
        
        .box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 35px; }
        h2 { color: #00ff88; margin-top: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #050505; color: #fff; border: 1px solid #333; border-radius: 10px; outline: none; }
        
        .price-row { display: flex; gap: 10px; }
        .btn-upload { width: 100%; padding: 16px; background: #00ff88; color: black; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 14px; text-transform: uppercase; margin-top: 10px; }
        .btn-cancel { display: block; text-align: center; width: 100%; padding: 12px; background: #333; color: white; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; font-size: 13px; }

        /* User Table */
        .section-title { color: #00ff88; border-left: 4px solid #00ff88; padding-left: 15px; margin: 40px 0 20px 0; font-size: 20px; font-weight: 700; }
        .table-responsive { width: 100%; overflow-x: auto; background: #111; border-radius: 15px; border: 1px solid #222; }
        .user-table { width: 100%; border-collapse: collapse; min-width: 700px; }
        .user-table th { background: #1a1a1a; color: #00ff88; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; }
        .user-table td { padding: 15px; border-bottom: 1px solid #222; font-size: 14px; }
        
        .balance-badge { background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 5px 10px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(0, 255, 136, 0.2); }

        .block-btn { padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; text-decoration: none; font-size: 11px; display: inline-block; }
        .remove-user-btn { padding: 8px 12px; border-radius: 8px; background: #ff4444; color: white; text-decoration: none; font-size: 11px; display: inline-block; margin-left: 5px; }

        .item-card { background: #111; padding: 15px 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid #222; }
        .swal2-popup { background: #111 !important; color: #fff !important; border-radius: 20px !important; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h1><i class="fas fa-shield-alt"></i> Asharib Admin</h1>
        <div style="background: rgba(0,255,136,0.1); padding: 5px 15px; border-radius: 50px; color: #00ff88; font-size: 12px; font-weight: bold; border: 1px solid #00ff8833;">
            <i class="fas fa-circle" style="font-size: 8px;"></i> LIVE SYSTEM
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-users"></i>
            <h3>{{ users|length }}</h3>
            <p>Customers</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-layer-group"></i>
            <h3>{{ products|length }}</h3>
            <p>Services</p>
        </div>
    </div>

    <div class="deposit-management-box">
        <div>
            <h3 style="margin: 0; font-size: 16px;">Deposit Requests</h3>
            <p style="margin: 5px 0 0 0; font-size: 11px; color: #888;">Verify payment screenshots and approve balance.</p>
        </div>
        
        <a href="/admin/deposits" class="deposit-btn {% if pending_exists %}btn-glow{% endif %}">
            <i class="fas fa-receipt"></i> VIEW REQUESTS
            {% if pending_exists %}
                <span class="pending-badge">NEW</span>
            {% endif %}
        </a>
    </div>

    <div class="box">
        {% if edit_product %}
            <h2><i class="fas fa-edit"></i> Edit Service: {{ edit_product.name }}</h2>
            <form method="POST" action="/admin/edit_product/{{ edit_product.id }}/">
                <input type="text" name="name" value="{{ edit_product.name }}" placeholder="Service Name" required>
                <div class="price-row">
                    <input type="number" name="old_price" value="{{ edit_product.old_price }}" placeholder="Old Price (Rs.)" required>
                    <input type="number" name="price" value="{{ edit_product.price }}" placeholder="Current Price (Rs.)" required>
                </div>
                <input type="number" name="stock" value="{{ edit_product.stock }}" placeholder="Stock Quantity" required>
                <input type="text" name="pic" value="{{ edit_product.pic }}" placeholder="Image URL" required>
                <textarea name="desc" rows="2" placeholder="Brief service info..." required>{{ edit_product.desc }}</textarea>
                <button type="submit" class="btn-upload">UPDATE SERVICE</button>
                <a href="/admin" class="btn-cancel">CANCEL EDIT</a>
            </form
