<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Deposit Requests</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
        h2 { color: #00ff88; text-align: center; margin-bottom: 30px; }
        .container { max-width: 950px; margin: auto; }
        
        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 15px; overflow: hidden; margin-top: 20px; border: 1px solid #222; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #00ff88; color: black; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        
        .btn { padding: 10px 18px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 11px; transition: 0.3s; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .btn-approve { background: #00ff88; color: black; }
        .btn-reject { background: #ff4444; color: white; }
        .btn-view { background: #222; color: #00ff88; border: 1px solid #00ff8833; }
        
        .btn:hover { opacity: 0.8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Modal Overlay */
        #imgModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #imgModal img { max-width: 90%; max-height: 85%; border-radius: 12px; border: 1px solid #00ff88; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #00ff88; font-size: 40px; cursor: pointer; transition: 0.3s; }
        .close-modal:hover { color: white; transform: rotate(90deg); }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-pending { background: rgba(255, 170, 0, 0.1); color: #ffaa00; border: 1px solid rgba(255, 170, 0, 0.3); }
        
        .fade-out { opacity: 0; transform: scale(0.9); transition: 0.5s ease; }
        
        .back-btn { color: #888; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .back-btn:hover { color: #00ff88; }
    </style>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <a href="/admin" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <span style="color: #444; font-size: 12px;">Admin Management Panel</span>
        </div>
        
        <h2><i class="fas fa-shield-halved"></i> Deposit Verification</h2>

        <table>
            <thead>
                <tr>
                    <th>User / ID</th>
                    <th>Amount</th>
                    <th>Screenshot</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="requestTable">
                {% for req in requests %}
                {% if req.status == 'Pending' %}
                <tr id="row-{{ req.id }}">
                    <td>
                        <span style="font-weight: 600;">{{ req.user.username }}</span><br>
                        <small style="color: #666; font-size: 9px;">ID: #DEP-0{{ req.id }}</small>
                    </td>
                    <td><b style="color: #00ff88;">Rs. {{ "%.2f"|format(req.amount) }}</b></td>
                    <td>
                        <button class="btn btn-view" onclick="showImage('data:image/png;base64,{{ req.proof_url }}')">
                            <i class="fas fa-eye"></i> View Proof
                        </button>
                    </td>
                    <td><span class="badge badge-pending">{{ req.status }}</span></td>
                    <td>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-approve" onclick="processAction('{{ req.id }}', 'approve')">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button class="btn btn-reject" onclick="processAction('{{ req.id }}', 'reject')">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        </div>
                    </td>
                </tr>
                {% endif %}
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div id="imgModal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img id="modalImg" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        function showImage(src) {
            const modal = document.getElementById('imgModal');
            const img = document.getElementById('modalImg');
            img.src = src;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('imgModal').style.display = 'none';
        }

        async function processAction(id, action) {
            const confirm = await Swal.fire({
                title: 'Confirm Action?',
                text: `Are you sure you want to ${action} this request?`,
                icon: 'warning',
                showCancelButton: true,
                background: '#111',
                color: '#fff',
                confirmButtonColor: action === 'approve' ? '#00ff88' : '#ff4444',
                cancelButtonColor: '#333',
                confirmButtonText: `Yes, ${action}!`
            });

            if (confirm.isConfirmed) {
                try {
                    const response = await fetch(`/admin/${action}_deposit/${id}`);
                    const data = await response.json();

                    if (data.status === "success") {
                        const row = document.getElementById(`row-${id}`);
                        row.classList.add('fade-out');
                        
                        setTimeout(() => {
                            row.remove();
                            checkEmpty();
                        }, 500);

                        Swal.fire({
                            title: 'Success!',
                            text: `Deposit has been ${action}d.`,
                            icon: 'success',
                            timer: 1500,
                            showConfirmButton: false,
                            background: '#111',
                            color: '#fff'
                        });
                    } else {
                        Swal.fire('Failed', data.message || 'Error processing request', 'error');
                    }
                } catch (err) {
                    Swal.fire('Error', 'Connection to server lost!', 'error');
                }
            }
        }

        function checkEmpty() {
            const tbody = document.getElementById('requestTable');
            if (tbody.children.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 50px; color: #444;">
                    <i class="fas fa-check-circle" style="font-size: 30px; color: #00ff88; margin-bottom: 10px; display: block;"></i>
                    All caught up! No pending requests.</td></tr>`;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });

        // Initial check if table is empty
        window.onload = checkEmpty;
    </script>

</body>
</html>
