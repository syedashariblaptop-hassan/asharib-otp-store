<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds | Asharib Tech Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .deposit-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,255,136,0.1); }
        h2 { color: #00ff88; margin-bottom: 10px; }
        .payment-info { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid #00ff88; text-align: left; }
        .payment-info p { margin: 5px 0; font-size: 14px; }
        
        input[type="number"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #080808; color: white; outline: none; box-sizing: border-box; }
        label { display: block; text-align: left; font-size: 12px; color: #888; margin-top: 10px; font-weight: 600; }
        
        .btn-submit { background: #00ff88; color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-submit:hover { background: #00bd65; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3); }
        .back-link { display: inline-block; margin-top: 20px; color: #555; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .back-link:hover { color: #00ff88; }
        
        input[type="file"]::file-selector-button { background: #222; color: #00ff88; border: 1px solid #00ff8833; padding: 5px 10px; border-radius: 5px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="deposit-card">
        <i class="fas fa-university" style="font-size: 40px; color: #00ff88; margin-bottom: 15px;"></i>
        <h2>Add Funds</h2>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Send payment to the account below and upload proof.</p>
        
        <div class="payment-info">
            <p><strong>Payment Method:</strong> <span style="float: right; color: #eee;">EasyPaisa</span></p>
            <p><strong>Account Number:</strong> <span style="float: right; color: #00ff88; font-weight: bold;">03232522768</span></p>
            <p><strong>Account Name:</strong> <span style="float: right; color: #eee;">Syed Asharab Hassan</span></p>
        </div>

        <form id="depositForm">
            <label>Deposit Amount (PKR)</label>
            <input type="number" name="amount" placeholder="Enter Amount" required min="10">
            
            <label>Payment Screenshot</label>
            <input type="file" name="screenshot" accept="image/*" required>
            
            <p style="color: #ffaa00; font-size: 10px; text-align: left; margin-top: 5px; line-height: 1.4;">
                <i class="fas fa-info-circle"></i> <b>Verification Note:</b> Please ensure the Transaction ID and Date are clearly visible in the screenshot.
            </p>

            <button type="submit" class="btn-submit" id="submitBtn">Confirm Deposit</button>
        </form>

        <a href="/" class="back-link"><i class="fas fa-chevron-left"></i> Back to Dashboard</a>
    </div>

    <script>
        document.getElementById('depositForm').onsubmit = async function(e) {
            e.preventDefault(); // Stop page refresh
            
            const btn = document.getElementById('submitBtn');
            const formData = new FormData(this);
            
            // Show Processing Alert
            Swal.fire({
                title: 'Processing Request',
                html: 'Uploading your proof to server...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                },
                background: '#111',
                color: '#fff'
            });

            btn.disabled = true;

            try {
                const response = await fetch('/deposit', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    Swal.fire({
                        title: 'Success!',
                        text: 'Your deposit request has been sent for review.',
                        icon: 'success',
                        background: '#111',
                        color: '#fff',
                        confirmButtonColor: '#00ff88'
                    }).then(() => {
                        window.location.href = '/'; // Redirect back
                    });
                } else {
                    Swal.fire({
                        title: 'Error',
                        text: data.message || 'Something went wrong',
                        icon: 'error',
                        background: '#111',
                        color: '#fff'
                    });
                    btn.disabled = false;
                }
            } catch (err) {
                Swal.fire({
                    title: 'Connection Error',
                    text: 'Could not connect to the server.',
                    icon: 'error',
                    background: '#111',
                    color: '#fff'
                });
                btn.disabled = false;
            }
        };
    </script>

</body>
</html>
