<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds | Asharib Tech Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .deposit-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,255,136,0.1); }
        h2 { color: #00ff88; margin-bottom: 10px; }
        .payment-info { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid #00ff88; text-align: left; }
        .payment-info p { margin: 5px 0; font-size: 14px; }
        input[type="number"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #080808; color: white; outline: none; }
        label { display: block; text-align: left; font-size: 12px; color: #888; margin-top: 10px; }
        .btn-submit { background: #00ff88; color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.3s; text-transform: uppercase; }
        .btn-submit:hover { background: #00bd65; transform: translateY(-2px); }
        .back-link { display: inline-block; margin-top: 20px; color: #555; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <div class="deposit-card">
        <i class="fas fa-wallet" style="font-size: 40px; color: #00ff88; margin-bottom: 15px;"></i>
        <h2>Deposit Money</h2>
        
        <div class="payment-info">
            <p><strong>Method:</strong> EasyPaisa / JazzCash</p>
            <p><strong>Number:</strong> <span style="color: #00ff88;">03232522768</span></p>
            <p><strong>Account Name:</strong> Syed Asharab Hassan</p>
        </div>

        <form action="/deposit" method="POST" enctype="multipart/form-data">
            <label>How much did you send?</label>
            <input type="number" name="amount" placeholder="Amount (PKR)" required min="1">
            
            <label>Upload Payment Screenshot (Gallery)</label>
            <input type="file" name="screenshot" accept="image/*" required>
            
            <small style="color: #666; font-size: 10px; display: block; margin-top: 5px;">
                Bhai, payment ke baad screenshot lazmi upload karein.
            </small>

            <button type="submit" class="btn-submit">Submit Request</button>
        </form>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Store</a>
    </div>

</body>
</html>
