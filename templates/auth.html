<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Asharib Tech Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Aapka original dark background */
            background: #000000;
        }

        .login-card {
            background: #111111; /* Dark Card */
            padding: 40px 30px;
            border-radius: 25px;
            border: 1px solid #222; /* Subtle border */
            box-shadow: 0 10px 40px rgba(0,255,136,0.05);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: #ffffff; margin-bottom: 10px; font-size: 26px; font-weight: 700; }
        p { color: #888; margin-bottom: 30px; font-size: 14px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #00ff88; font-weight: 600; font-size: 13px; text-transform: uppercase; }
        
        input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #1a1a1a;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }

        input:focus { border-color: #00ff88; box-shadow: 0 0 8px rgba(0, 255, 136, 0.2); }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .checkbox-group { display: flex; align-items: center; gap: 8px; color: #ccc; }
        .checkbox-group input { width: auto; cursor: pointer; }
        .forgot-pass { color: #ff4444; text-decoration: none; font-weight: 600; }

        /* Dastur Style Button but with your theme colors */
        .login-btn {
            background: #00ff88; 
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover { background: #00bd65; transform: translateY(-2px); }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #555;
            font-size: 12px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #333; margin: 0 10px; }

        .footer-text { font-size: 14px; color: #888; }
        .footer-text a { color: #00ff88; text-decoration: none; font-weight: 600; }

        .error { color: #ff4444; font-size: 13px; margin-bottom: 15px; display: block; background: rgba(255,68,68,0.1); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Welcome Back</h2>
        <p>Login to Asharib Tech Store</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <span class="error"><i class="fas fa-exclamation-circle"></i> {{ message }}</span>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="options-row">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember" style="margin: 0; color: #ccc; text-transform: none;">Remember me</label>
                </div>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="divider">OR</div>

        <div class="footer-text">
            Don't have an account? <a href="/register">Sign up here</a>
        </div>
    </div>

</body>
</html>
