<!DOCTYPE html>
<html>
<head>
    <title>Login | Asharib Tech Store</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #00ff88; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        h2 { color: #00ff88; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        input:focus { border-color: #00ff88; }
        .btn { background: #00ff88; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .toggle-link { color: #888; font-size: 13px; margin-top: 15px; cursor: pointer; display: block; }
        .toggle-link b { color: #00ff88; }
    </style>
</head>
<body>

<div class="auth-card" id="loginBox">
    <h2>Welcome Back</h2>
    <p style="color: #888; font-size: 14px;">Login to access the OTP Store</p>
    <form action="/login_user" method="POST">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="pass" placeholder="Password" required>
        <button type="submit" class="btn">LOGIN NOW</button>
    </form>
    <span class="toggle-link" onclick="toggleAuth()">New here? <b>Create Account</b></span>
</div>

<div class="auth-card" id="registerBox" style="display: none;">
    <h2>Join Us</h2>
    <p style="color: #888; font-size: 14px;">Create your professional account</p>
    <form action="/register_user" method="POST">
        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="password" name="pass" placeholder="Set Password" required>
        <button type="submit" class="btn">REGISTER</button>
    </form>
    <span class="toggle-link" onclick="toggleAuth()">Already have account? <b>Login</b></span>
</div>

<script>
    function toggleAuth() {
        var login = document.getElementById('loginBox');
        var register = document.getElementById('registerBox');
        if (login.style.display === "none") {
            login.style.display = "block";
            register.style.display = "none";
        } else {
            login.style.display = "none";
            register.style.display = "block";
        }
    }
</script>

</body>
</html>
